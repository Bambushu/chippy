<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none" role="img" aria-label="Chippy">
  <rect width="800" height="240" fill="#0b0b0d"/>

  <!-- chip body -->
  <rect x="170" y="60" width="460" height="120" fill="#121214" stroke="#ff7a29" stroke-width="3"/>

  <!-- orientation dot (top-left corner marker, like a real IC) -->
  <circle cx="192" cy="82" r="5" fill="#ff7a29"/>

  <!-- top pins -->
  <g fill="#ff7a29">
    <rect x="210" y="38" width="18" height="22"/>
    <rect x="262" y="38" width="18" height="22"/>
    <rect x="314" y="38" width="18" height="22"/>
    <rect x="366" y="38" width="18" height="22"/>
    <rect x="418" y="38" width="18" height="22"/>
    <rect x="470" y="38" width="18" height="22"/>
    <rect x="522" y="38" width="18" height="22"/>
    <rect x="574" y="38" width="18" height="22"/>
  </g>

  <!-- bottom pins -->
  <g fill="#ff7a29">
    <rect x="210" y="180" width="18" height="22"/>
    <rect x="262" y="180" width="18" height="22"/>
    <rect x="314" y="180" width="18" height="22"/>
    <rect x="366" y="180" width="18" height="22"/>
    <rect x="418" y="180" width="18" height="22"/>
    <rect x="470" y="180" width="18" height="22"/>
    <rect x="522" y="180" width="18" height="22"/>
    <rect x="574" y="180" width="18" height="22"/>
  </g>

  <!-- CHIPPY wordmark -->
  <text x="400" y="140" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace" font-size="66" font-weight="700" fill="#f5f2ed" text-anchor="middle" letter-spacing="10">CHIPPY</text>

  <!-- tagline under wordmark -->
  <text x="400" y="165" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace" font-size="11" font-weight="400" fill="#9a8a78" text-anchor="middle" letter-spacing="4">FORGE / HARVEST / SPAWN</text>
</svg>
