<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chippy mascot bake-off</title>
<style>
  body {
    margin: 0;
    background: #0e0e10;
    color: #e8e6e2;
    font: 15px/1.5 -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
    padding: 40px;
  }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 32px; letter-spacing: 0.3px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
    max-width: 1800px;
  }
  .cell {
    background: #16161a;
    border: 1px solid #2a2a2e;
    border-radius: 14px;
    padding: 18px;
  }
  .cell img { width: 100%; height: auto; display: block; border-radius: 8px; }
  .cell .meta {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .cell .label { font-weight: 600; font-size: 16px; }
  .cell .desc { color: #9a8a78; font-size: 13px; }
</style>
</head>
<body>
  <h1>Chippy mascot bake-off &middot; pick one</h1>
  <div class="grid">
    <div class="cell">
      <img src="concept_e_a_smidje.svg" alt="Smidje">
      <div class="meta"><span class="label">A &middot; Smidje</span><span class="desc">Tiny blacksmith, ties to your *Smid family</span></div>
    </div>
    <div class="cell">
      <img src="concept_e_b_anvil.svg" alt="Anvil">
      <div class="meta"><span class="label">B &middot; Anvil-with-eyes</span><span class="desc">Minimal, abstract, fits geometric brand</span></div>
    </div>
    <div class="cell">
      <img src="concept_e_c_ember.svg" alt="Ember">
      <div class="meta"><span class="label">C &middot; Ember</span><span class="desc">Spark sprite, brand-orange, dynamic</span></div>
    </div>
    <div class="cell">
      <img src="concept_e_d_klepje.svg" alt="Klepje">
      <div class="meta"><span class="label">D &middot; Klepje</span><span class="desc">Paperclip homage, Dutch wordplay</span></div>
    </div>
  </div>
</body>
</html>
