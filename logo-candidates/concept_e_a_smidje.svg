<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Chippy with Smidje mascot">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.45"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="320" fill="#0b0b0d"/>

  <g>
    <rect x="608" y="6" width="44" height="3" fill="#3a3a3a"/>
    <path d="M 614 6 L 646 6 L 644 -2 Q 630 -10 616 -2 Z" fill="#3a3a3a"/>
    <circle cx="630" cy="22" r="14" fill="#e8c8a8"/>
    <circle cx="625" cy="22" r="1.8" fill="#1a1a1a"/>
    <circle cx="635" cy="22" r="1.8" fill="#1a1a1a"/>
    <path d="M 624 28 Q 630 32 636 28" fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M 610 34 L 650 34 L 656 90 L 604 90 Z" fill="#8a4a30"/>
    <rect x="628" y="34" width="4" height="56" fill="#6a3a20"/>
  </g>

  <rect x="48" y="44" width="704" height="232" rx="20" fill="#f5f2ed" filter="url(#cardShadow)"/>

  <text x="80" y="88" font-family="-apple-system, 'SF Pro Text', 'Inter', system-ui, sans-serif" font-size="14" fill="#9a8a78" letter-spacing="0.2">Suggested task</text>

  <g stroke="#9a8a78" stroke-width="1.5" stroke-linecap="round">
    <line x1="708" y1="80" x2="722" y2="94"/>
    <line x1="722" y1="80" x2="708" y2="94"/>
  </g>

  <text x="80" y="138" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="34" font-weight="700" fill="#1a1a1a">Chippy</text>

  <text x="80" y="174" font-family="-apple-system, 'SF Pro Text', 'Inter', system-ui, sans-serif" font-size="15" fill="#6a6a6a">Forge a chip prompt before spawning a task.</text>
  <text x="80" y="195" font-family="-apple-system, 'SF Pro Text', 'Inter', system-ui, sans-serif" font-size="15" fill="#6a6a6a">Cold-reader checked. Worktree-ready.</text>

  <g>
    <rect x="556" y="218" width="160" height="44" rx="10" fill="#fafaf7" stroke="#d4d0c8" stroke-width="1"/>
    <text x="580" y="246" font-family="-apple-system, 'SF Pro Text', 'Inter', system-ui, sans-serif" font-size="15" font-weight="500" fill="#1a1a1a">Start locally</text>
    <line x1="686" y1="226" x2="686" y2="254" stroke="#d4d0c8" stroke-width="1"/>
    <path d="M 696 232 L 704 240 L 696 248" fill="none" stroke="#ff7a29" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
